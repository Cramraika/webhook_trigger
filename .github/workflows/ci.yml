# =============================================
# Webhook Trigger - CI Pipeline
# =============================================
# Lint → Security Audit → Summary
# =============================================

name: CI

on:
  push:
    branches: [main, master]
    paths-ignore: ['*.md', 'docs/**', '.claude/**', '.vscode/**']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 pip-audit
          pip install -r requirements.txt

      - name: Lint (flake8)
        id: lint
        run: |
          flake8 *.py --max-line-length=120 --count --show-source --statistics \
            --select=E9,F63,F7,F82,E1,E4,W6

      - name: Security audit (pip-audit)
        id: security
        continue-on-error: true
        run: pip-audit --desc 2>&1 | head -50

      - name: Validate environment
        id: envcheck
        run: |
          echo "Required files:"
          [ -f "requirements.txt" ] && echo "  ✅ requirements.txt" || echo "  ❌ requirements.txt missing"
          [ -f "webhook_trigger.py" ] && echo "  ✅ webhook_trigger.py" || echo "  ❌ webhook_trigger.py missing"
          [ -f "runtime.txt" ] && echo "  ✅ runtime.txt" || echo "  ⚠️ runtime.txt missing (optional)"

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ steps.security.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Env Validation | ${{ steps.envcheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
